<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#fff8e1"/>

  <!-- Magic wand handle -->
  <rect x="180" y="200" width="15" height="80" fill="#8B4513"/>

  <!-- Magic wand star -->
  <g transform="translate(188, 120)">
    <!-- Main star -->
    <polygon points="0,-40 10,-10 40,-10 15,10 25,40 0,20 -25,40 -15,10 -40,-10 -10,-10" fill="#FFD700"/>

    <!-- Sparkles -->
    <circle cx="-60" cy="-40" r="4" fill="#FFD700"/>
    <circle cx="60" cy="-30" r="3" fill="#FFD700"/>
    <circle cx="40" cy="50" r="3" fill="#FFD700"/>
  </g>

  <!-- Letter E -->
  <text x="100" y="220" font-size="80" font-weight="bold" fill="#FF6B6B">e</text>

  <!-- Transformation arrow -->
  <path d="M 200 240 L 260 240" stroke="#4CAF50" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4CAF50"/>
    </marker>
  </defs>

  <!-- Word examples -->
  <text x="200" y="100" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">
    Magic E Makes Vowels Speak!
  </text>

  <text x="50" y="260" font-size="18" fill="#666">
    can → cane
  </text>

  <text x="260" y="260" font-size="18" fill="#666">
    mat → mate
  </text>
</svg>
