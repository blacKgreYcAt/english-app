<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box-front { fill: #FF6B35; stroke: #333333; stroke-width: 3; }
      .box-top { fill: #FFB84D; stroke: #333333; stroke-width: 3; }
      .box-side { fill: #FF8C42; stroke: #333333; stroke-width: 3; }
      .shadow { fill: rgba(0,0,0,0.1); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#F5F5F5"/>

  <!-- Shadow beneath box -->
  <ellipse cx="100" cy="185" rx="60" ry="12" class="shadow"/>

  <!-- Box main front face -->
  <rect x="35" y="70" width="130" height="90" class="box-front" rx="6"/>

  <!-- Box top face (lid perspective) -->
  <polygon points="35,70 55,50 185,50 165,70" class="box-top"/>

  <!-- Box right side -->
  <polygon points="165,70 185,50 185,140 165,160" class="box-side"/>

  <!-- Box opening/shine effect (suggest it's a container) -->
  <ellipse cx="100" cy="75" rx="55" ry="12" fill="#FFCC80" opacity="0.6"/>

  <!-- Decorative tape on box (X pattern) -->
  <line x1="50" y1="85" x2="150" y2="145" stroke="#8B4513" stroke-width="2" opacity="0.4"/>
  <line x1="150" y1="85" x2="50" y2="145" stroke="#8B4513" stroke-width="2" opacity="0.4"/>

  <!-- Box label/text area -->
  <rect x="50" y="100" width="100" height="50" fill="#FFFFFF" opacity="0.3" rx="4"/>

  <!-- Big happy text on box -->
  <text x="100" y="135" font-size="28" font-weight="bold" text-anchor="middle" fill="#333333" font-family="Arial, sans-serif">
    BOX
  </text>

  <!-- Decorative dots -->
  <circle cx="70" cy="110" r="4" fill="#FF6B35"/>
  <circle cx="100" cy="110" r="4" fill="#FF6B35"/>
  <circle cx="130" cy="110" r="4" fill="#FF6B35"/>

  <!-- Handle suggestion (fold lines) -->
  <path d="M 70 55 Q 70 45 100 42 Q 130 45 130 55" stroke="#8B4513" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>

  <!-- Corner highlight to show 3D -->
  <polygon points="165,70 175,62 175,75" fill="#FFEB3B" opacity="0.4"/>

  <!-- Shine reflection on right side -->
  <ellipse cx="175" cy="95" rx="8" ry="20" fill="#FFFFFF" opacity="0.3"/>
</svg>
